version: '3.8'

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: twitter-downloader-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - downloader

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: twitter-downloader-rabbitmq
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - downloader

  # FastAPI Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: twitter-downloader-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./:/app
    networks:
      - downloader
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Worker Process (can be scaled: docker-compose up -d --scale worker=3)
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: twitter-downloader-worker-1
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./:/app
      - downloads:/app/downloads
    networks:
      - downloader
    command: python worker.py

volumes:
  redis_data:
  rabbitmq_data:
  downloads:

networks:
  downloader:
    driver: bridge
