<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.7; }
        .wrap { max-width: 720px; margin: 0 auto; padding: 48px 20px 80px; }
        .feat { width: 100%; max-height: 380px; object-fit: cover; border-radius: 16px; margin-bottom: 28px; }
        h1 { font-size: clamp(1.75rem, 4vw, 2.25rem); font-weight: 800; letter-spacing: -0.02em; margin: 0 0 24px; }
        .article-body { font-size: 1.05rem; color: #cbd5e1; }
        .article-body img { max-width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <article class="wrap">
        {% if post.featured_image_url %}
        <img class="feat" src="{{ post.featured_image_url }}" alt="">
        {% endif %}
        <h1>{{ post.title }}</h1>
        <div class="article-body">{{ post.content | safe }}</div>
    </article>
</body>
</html>
